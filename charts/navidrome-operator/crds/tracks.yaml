apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tracks.navidrome.m1xxos.dev
spec:
  group: navidrome.m1xxos.dev
  names:
    kind: Track
    listKind: TrackList
    plural: tracks
    singular: track
    shortNames:
    - ndtr
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    additionalPrinterColumns:
    - name: Ready
      type: string
      jsonPath: .status.conditions[0].status
    - name: Synced
      type: string
      jsonPath: .status.synced
    - name: Priority
      type: integer
      jsonPath: .spec.priority
    - name: ResolvedTrackID
      type: string
      jsonPath: .status.resolvedTrackID
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required: [ playlistRef, trackRef ]
            properties:
              playlistRef:
                type: object
                required: [ name ]
                properties:
                  name:
                    type: string
              trackRef:
                type: object
                properties:
                  trackID:
                    type: string
                  filePath:
                    type: string
                  artist:
                    type: string
                  title:
                    type: string
              priority:
                type: integer
                minimum: 0
              position:
                type: integer
                minimum: 0
          status:
            type: object
            properties:
              resolvedTrackID:
                type: string
              observedGeneration:
                type: integer
                format: int64
              synced:
                type: boolean
              conditions:
                type: array
                items:
                  type: object
                  required: [ type, status, reason, message, lastTransitionTime ]
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      type: integer
                      format: int64
                    lastTransitionTime:
                      type: string
                      format: date-time
